version: '3.8'

services:
  api:
    build: .
    container_name: health-engine-api
    ports:
      - "8000:8000"
    environment:
      - ENV=production
      - LOG_LEVEL=INFO
      - MODEL_PATH=/app/models/trained/recovery_random_forest.pkl
    volumes:
      - ./data:/app/data
      - ./models:/app/models
      - ./logs:/app/logs
    command: python -m uvicorn app.main:app --host 0.0.0.0 --port 8000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8000/health').raise_for_status()"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

  gradio:
    build: .
    container_name: health-engine-gradio
    ports:
      - "7860:7860"
    environment:
      - ENV=production
      - GRADIO_SERVER_NAME=0.0.0.0
      - GRADIO_SERVER_PORT=7860
    volumes:
      - ./data:/app/data
      - ./models:/app/models
    command: python app.py
    restart: unless-stopped
    depends_on:
      - api
